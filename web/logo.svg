  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8dffc4"/><stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a7dff"/><stop offset="1" stop-color="#3350c0"/>
